# Full production stack: the fastrak web app + its Postgres database.
#
#   docker compose up -d --build
#
# Compose reads variables (SESSION_SECRET, ADMIN_PASSWORD, POSTGRES_PASSWORD…)
# from a local `.env` file — see .env.example. The app's DATABASE_URL is set
# HERE (pointing at the `db` service), not in .env, so local `npm run dev` stays
# on PGlite and only the container talks to Postgres.
services:
  db:
    image: postgres:16
    container_name: project-kenny-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: projectkenny
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projectkenny"]
      interval: 5s
      timeout: 5s
      retries: 12
    # No host port published by default — only the app needs to reach it. Add a
    # `ports: ["5432:5432"]` line temporarily if you want to inspect it directly.

  app:
    build: .
    container_name: project-kenny-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/projectkenny
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env (e.g. openssl rand -hex 32)}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: production
    # No host port published — the app is only reached through Caddy (HTTPS).
    expose:
      - "3000"

  # Reverse proxy that terminates HTTPS. Caddy automatically obtains and renews a
  # free Let's Encrypt certificate for the domain in ./Caddyfile, then forwards
  # traffic to the app container over the private network.
  caddy:
    image: caddy:2
    container_name: project-kenny-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
